name: Aggiorna Eventi CF

on:
  schedule:
    - cron: '0 6 * * 1'   # Ogni lunedì alle 06:00 UTC
  workflow_dispatch:        # Avvio manuale da GitHub

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Installa dipendenze
        run: pip install requests beautifulsoup4 lxml

      - name: Esegui scraper
        run: python scraper.py

      - name: Commit eventi.json
        run: |
          git config user.name "radar-bot"
          git config user.email "radar-bot@users.noreply.github.com"
          git add eventi.json
          git diff --staged --quiet || git commit -m "Aggiorna eventi $(date '+%Y-%m-%d')"
          git push
